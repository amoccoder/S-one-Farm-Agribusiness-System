global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 's-one-farm-erp'

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (System metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Microservices
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3001']
  
  - job_name: 'farm-service'
    static_configs:
      - targets: ['farm-service:3002']

  - job_name: 'crop-service'
    static_configs:
      - targets: ['crop-service:3003']

  - job_name: 'livestock-service'
    static_configs:
      - targets: ['livestock-service:3004']

  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:3005']

  - job_name: 'finance-service'
    static_configs:
      - targets: ['finance-service:3006']

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:3007']

  # Database Exporters
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']